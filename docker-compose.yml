services:
  app:
    build: .
    container_name: php-app
    ports:
      - "80:80"
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET:-change-me-for-local-dev}
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./src:/var/www/html
      - app_vendor:/var/www/html/vendor
      - app_var:/var/www/html/var
    working_dir: /var/www/html
    command: sh -c "composer install --no-interaction --prefer-dist --no-progress && mkdir -p var/cache var/log && chown -R www-data:www-data var && apache2-foreground"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  pgdata:
  app_vendor:
  app_var:
